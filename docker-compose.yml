  ml-worker:
    build:
      context: .
      dockerfile: apps/ml_worker/Dockerfile
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://maxbot:maxbot@postgres:5432/maxbot
      DATA_DIR: /app/data
      ML_BATCH_SIZE: "8"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://maxbot:maxbot@postgres:5432/maxbot
      API_HOST: 0.0.0.0
      API_PORT: "5000"
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
