<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        
        console.log("началось...")

        let get_info = async () =>
        {
            let response = await fetch("http://127.0.0.1:5000/stats?chat_id=200")

            if (response.ok){
                let json = await response.json()
                console.log(json)
            }
            else {
                console.log(`Ошибка при попытке загрузить данные: ${response.status}`)
            }
        }

        get_info()
    </script>
</body>
</html>
